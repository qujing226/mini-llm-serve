apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-server
  namespace: mini-llm
  labels:
    app.kubernetes.io/name: mini-llm-server
    app.kubernetes.io/instance: demo
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mini-llm-server
      app.kubernetes.io/instance: demo
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mini-llm-server
        app.kubernetes.io/instance: demo
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: server
          image: mini-llm-server:local
          imagePullPolicy: IfNotPresent
          args:
            - --conf=/etc/mini-llm/server.toml
          ports:
            - name: inference
              containerPort: 8800
            - name: admin
              containerPort: 8801
          volumeMounts:
            - name: config
              mountPath: /etc/mini-llm
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: demo-server-config
---
apiVersion: v1
kind: Service
metadata:
  name: demo-server
  namespace: mini-llm
  labels:
    app.kubernetes.io/name: mini-llm-server
    app.kubernetes.io/instance: demo
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mini-llm-server
    app.kubernetes.io/instance: demo
    app.kubernetes.io/component: server
  ports:
    - name: inference
      port: 8800
      targetPort: inference
    - name: admin
      port: 8801
      targetPort: admin
