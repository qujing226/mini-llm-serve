syntax = "proto3";

package mini_llm_serve.v1;

import "mini_llm_serve/v1/core.proto";

service InferenceService {
  rpc Generate(GenerateRequest) returns (GenerateResponse);
//  rpc Generate(GenerateRequest) returns (stream GenerateResponseChunk);
}

service AdminService{
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc GetRuntimeStats(GetRuntimeStatsRequest) returns (GetRuntimeStatsResponse);
}

message GenerateRequest{
  string request_id = 1;
  string model = 2;
  string prompt = 3;
  uint32 max_tokens = 4; // mock inference can determine sleep time, output_length by this.
  uint32 timeout_ms = 5;
  map<string, string> labels = 10;
}

message GenerateResponse{
  string request_id = 1;
  string output_text = 2;
  FinishReason finish_reason = 3;
  Usage usage = 4;
  Timing timing = 5;
  BatchInfo batch = 6;
  string worker_id = 7;
}


message GenerateResponseChunk {
  string request_id = 1;
  uint32 index = 2;
  string delta_text =3 ;
  bool done = 4;
  FinishReason finish_reason = 5;
  Usage usage = 6;
}

message HealthRequest{}

message HealthResponse{
  string status = 1;
}

message GetRuntimeStatsRequest{}

message GetRuntimeStatsResponse{
  uint32 queue_len = 1;
  uint32 inflight_requests = 2;
  uint32 inflight_batches = 3;
  uint32 busy_workers = 4;
  uint32 idle_workers = 5;
}