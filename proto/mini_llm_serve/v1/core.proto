syntax = "proto3";

package mini_llm_serve.v1;

import "vendor/daotl/protoc-gen-go-enums/ext.proto";
import "vendor/daotl/protoc-gen-go-string-consts/ext.proto";

enum FinishReason {
  option (daotl.gen_go_enums.name_pascal_case) = true;
  option (daotl.gen_go_enums.strip_name_prefix) = "FinishReason_";
  option (daotl.gen_go_string_consts.enabled) = true;
  option (daotl.gen_go_string_consts.strip_name_prefix) = "FinishReason_";
  option (daotl.gen_go_string_consts.name_pascal_case) = true;
  option (daotl.gen_go_string_consts.name_suffix) = "Str";
  option (daotl.gen_go_string_consts.strip_value_prefix) = "FINISH_REASON_";
  option (daotl.gen_go_string_consts.value_prefix) = "FR_";
  FINISH_REASON_UNSPECIFIED = 0;
  FINISH_REASON_STOP = 1;
  FINISH_REASON_LENGTH = 2;
  FINISH_REASON_TIMEOUT = 3;
  FINISH_REASON_ERROR = 4;
}

enum WorkPhase {
  option (daotl.gen_go_enums.name_pascal_case) = true;
  option (daotl.gen_go_enums.strip_name_prefix) = "WorkPhase_";
  option (daotl.gen_go_string_consts.enabled) = true;
  option (daotl.gen_go_string_consts.strip_name_prefix) = "WorkPhase_";
  option (daotl.gen_go_string_consts.name_pascal_case) = true;
  option (daotl.gen_go_string_consts.name_suffix) = "Str";
  option (daotl.gen_go_string_consts.strip_value_prefix) = "WORK_PHASE_";
  option (daotl.gen_go_string_consts.value_prefix) = "WR_";
  WORK_PHASE_PREFILL = 0;
  WORK_PHASE_DECODE = 1;
}

enum EventType {
  option (daotl.gen_go_enums.name_pascal_case) = true;
  option (daotl.gen_go_enums.strip_name_prefix) = "EventType_";
  option (daotl.gen_go_string_consts.enabled) = true;
  option (daotl.gen_go_string_consts.strip_name_prefix) = "EventType_";
  option (daotl.gen_go_string_consts.name_pascal_case) = true;
  option (daotl.gen_go_string_consts.name_suffix) = "Str";
  option (daotl.gen_go_string_consts.strip_value_prefix) = "EVENT_TYPE_";
  option (daotl.gen_go_string_consts.value_prefix) = "ET_";
  EVENT_TYPE_PREFILL_FINISHED = 0;
  EVENT_TYPE_DECODE_CHUNK = 1;
  EVENT_TYPE_REQUEST_FINISHED = 2;
  EVENT_TYPE_REQUEST_FAILED = 3;
  EVENT_TYPE_REQUEST_CANCELED = 4;
}

message Usage {
  uint32 input_tokens = 1;
  uint32 output_tokens = 2;
  uint32 total_tokens = 3;
}

message Timing{
  uint32 queue_ms = 1;
  uint32 batch_wait_ms = 2;
  uint32 execution_ms = 3;
  uint32 total_ms = 4;
}

message BatchInfo {
  string batch_id = 1;
  uint32 batch_size = 2;
}